<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelagic Solutions — FactorFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Gadugi','Segoe UI',sans-serif; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 16px; color: #2B4C7E; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="loading">Loading Pelagic FactorFlow...</div></div>
  <script>
    fetch('Dashboard-github.jsx')
      .then(function(r) { return r.text(); })
      .then(function(jsxCode) {
        var fullCode = jsxCode + '\nvar root = ReactDOM.createRoot(document.getElementById("root"));\nroot.render(React.createElement(PelagicDashboard));';
        var output = Babel.transform(fullCode, { presets: ['react'] });
        (0, eval)(output.code);
      })
      .catch(function(err) {
        document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:monospace;">Error loading dashboard:<br><br>' + err.message + '</div>';
      });
  </script>
</body>
</html>
